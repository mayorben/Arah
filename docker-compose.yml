services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-arah}
      POSTGRES_USER: ${POSTGRES_USER:-arah}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-changeme}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-arah}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - arah_net

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - arah_net

  minio:
    image: minio/minio:latest
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-changeme123}
    volumes:
      - minio_data:/data
    ports:
      - "9001:9001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 15s
      timeout: 10s
      retries: 5
    networks:
      - arah_net

  api:
    build:
      context: ./api
      dockerfile: Dockerfile
    restart: unless-stopped
    command: uvicorn main:app --host 0.0.0.0 --port 8000 --reload
    env_file: .env
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
    volumes:
      - ./api:/app
    networks:
      - arah_net

  worker:
    build:
      context: ./api
      dockerfile: Dockerfile
    restart: unless-stopped
    command: celery -A tasks.celery_app worker --loglevel=info -Q default,invoices,whatsapp,alerts
    env_file: .env
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
    volumes:
      - ./api:/app
    networks:
      - arah_net

  beat:
    build:
      context: ./api
      dockerfile: Dockerfile
    restart: unless-stopped
    command: celery -A tasks.celery_app beat --loglevel=info --scheduler celery.beat.PersistentScheduler
    env_file: .env
    depends_on:
      - redis
    volumes:
      - ./api:/app
      - beat_data:/app/celerybeat-schedule
    networks:
      - arah_net

  dashboard:
    build:
      context: ./dashboard
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost/api}
      NEXT_PUBLIC_APP_NAME: ${APP_NAME:-Arah Provisions}
    depends_on:
      - api
    networks:
      - arah_net

  nginx:
    image: nginx:1.25-alpine
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - api
      - dashboard
    networks:
      - arah_net

volumes:
  postgres_data:
  redis_data:
  minio_data:
  beat_data:

networks:
  arah_net:
    driver: bridge
